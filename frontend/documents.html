<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documents – AccrediTrack</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
renderLayout('Documents', 'documents');
const user = getUser();
const canDelete = ['Admin','HOD'].includes(user.role);

async function load(search='', category='') {
  const p = new URLSearchParams();
  if (search) p.set('search', search);
  if (category) p.set('category', category);
  const data = await apiFetch('/documents?' + p);
  const grid = document.getElementById('doc-grid');
  if (!data.length) { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No documents found</p></div>`; return; }
  grid.innerHTML = data.map(d => {
    const isImg = d.file_type && d.file_type.startsWith('image/');
    const isPdf = d.file_type === 'application/pdf';
    const icon = isPdf
      ? `<svg width="32" height="32" fill="none" stroke="#ef4444" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/></svg>`
      : isImg
      ? `<svg width="32" height="32" fill="none" stroke="#10b981" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`
      : `<svg width="32" height="32" fill="none" stroke="#6366f1" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
    return `
    <div style="background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="flex-shrink:0;width:48px;height:48px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title}</div>
          <div style="font-size:12px;color:var(--text-muted)">${d.category || 'Uncategorized'}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${d.uploader || 'Unknown'} · ${formatDate(d.created_at)}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-secondary" style="flex:1;justify-content:center" onclick="viewDoc(${d.id}, '${(d.file_type||'').replace(/'/g,"\\'")}', '${d.title.replace(/'/g,"\\'")}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> View
        </button>
        <a href="/api/documents/download/${d.id}" class="btn btn-sm btn-secondary btn-icon" title="Download" onclick="return attachToken(event, ${d.id})">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </a>
        ${canDelete ? `<button class="btn btn-sm btn-danger btn-icon" onclick="deleteDoc(${d.id})" title="Delete"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function viewDoc(id, fileType, title) {
  const isImg = fileType.startsWith('image/');
  const isPdf = fileType === 'application/pdf';
  if (!isImg && !isPdf) { showToast('Preview not available for this file type. Use Download.', 'error'); return; }
  try {
    const res = await fetch(`/api/documents/download/${id}`, { headers: { Authorization: `Bearer ${getToken()}` } });
    if (!res.ok) throw new Error('Failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const previewEl = document.getElementById('doc-preview-content');
    document.getElementById('doc-preview-title').textContent = title;
    document.getElementById('doc-preview-download').href = url;
    document.getElementById('doc-preview-download').download = title;
    if (isPdf) {
      previewEl.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none"></iframe>`;
    } else {
      previewEl.innerHTML = `<img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:8px" alt="${title}" />`;
    }
    openModal('doc-preview-modal');
  } catch(e) { showToast('Failed to load preview', 'error'); }
}

async function attachToken(e, id) {
  e.preventDefault();
  try {
    const res = await fetch(`/api/documents/download/${id}`, { headers: { Authorization: `Bearer ${getToken()}` } });
    if (!res.ok) throw new Error('Failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = ''; document.body.appendChild(a); a.click(); a.remove();
  } catch(e) { showToast('Download failed', 'error'); }
  return false;
}

async function deleteDoc(id) {
  if (!confirm('Delete this document?')) return;
  try { await apiFetch('/documents/' + id, { method: 'DELETE' }); showToast('Document deleted'); load(); } catch(e) { showToast(e.message,'error'); }
}

async function uploadDoc(e) {
  e.preventDefault();
  const file = document.getElementById('doc-file').files[0];
  if (!file) return showToast('Select a file','error');
  const fd = new FormData();
  fd.append('file', file);
  fd.append('title', document.getElementById('doc-title').value || file.name);
  fd.append('category', document.getElementById('doc-category').value);
  const btn = document.getElementById('upload-btn');
  btn.disabled = true; btn.textContent = 'Uploading...';
  try {
    await apiFetch('/documents', { method: 'POST', body: fd, headers: {} });
    showToast('Document uploaded'); closeModal('upload-modal'); load();
  } catch(e) { showToast(e.message,'error'); }
  finally { btn.disabled = false; btn.textContent = 'Upload'; }
}

document.getElementById('page-content').innerHTML = `
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <span class="card-title">Documents</span>
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="d-search" placeholder="Search documents..." oninput="load(this.value,document.getElementById('d-cat').value)" />
        </div>
        <select class="filter-select" id="d-cat" onchange="load(document.getElementById('d-search').value,this.value)">
          <option value="">All Categories</option>
          <option>Accreditation</option><option>Faculty</option><option>Student</option><option>Research</option><option>Administrative</option><option>Other</option>
        </select>
        <button class="btn btn-primary" onclick="openModal('upload-modal')">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload
        </button>
      </div>
    </div>
  </div>
  <div id="doc-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px">
    <div style="text-align:center;padding:32px;color:var(--text-muted);grid-column:1/-1">Loading...</div>
  </div>

  <div class="modal-overlay" id="doc-preview-modal">
    <div class="modal" style="max-width:900px;width:95vw;height:90vh;display:flex;flex-direction:column">
      <div class="modal-header">
        <span class="modal-title" id="doc-preview-title">Document Preview</span>
        <div style="display:flex;gap:8px;align-items:center">
          <a id="doc-preview-download" class="btn btn-sm btn-primary" download>
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download
          </a>
          <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal('doc-preview-modal')">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div id="doc-preview-content" style="flex:1;overflow:auto;padding:16px;display:flex;align-items:center;justify-content:center;background:#f3f4f6;border-radius:0 0 14px 14px"></div>
    </div>
  </div>

  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Upload Document</span>
        <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal('upload-modal')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form onsubmit="uploadDoc(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Document Title</label>
            <input class="form-control" id="doc-title" placeholder="Leave blank to use filename" />
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-control" id="doc-category">
              <option>Accreditation</option><option>Faculty</option><option>Student</option><option>Research</option><option>Administrative</option><option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">File *</label>
            <div class="upload-zone" onclick="document.getElementById('doc-file').click()" id="drop-zone">
              <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <p><strong>Click to browse</strong> or drag & drop</p>
              <p style="font-size:11px;margin-top:4px">PDF, Images, Word documents (max 10MB)</p>
              <p id="file-name" style="margin-top:8px;font-size:12px;color:var(--primary)"></p>
            </div>
            <input type="file" id="doc-file" class="hidden" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" onchange="document.getElementById('file-name').textContent=this.files[0]?.name||''" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('upload-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="upload-btn">Upload</button>
        </div>
      </form>
    </div>
  </div>
`;

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); const f = e.dataTransfer.files[0]; if (f) { document.getElementById('doc-file').files = e.dataTransfer.files; document.getElementById('file-name').textContent = f.name; } });

load();
</script>
</body>
</html>
