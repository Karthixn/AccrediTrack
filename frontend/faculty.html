<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty – AccrediTrack</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
renderLayout('Faculty Management', 'faculty');
const user = getUser();
const canEdit = ['Admin','HOD'].includes(user.role);
let editId = null;

async function load(search='', dept='') {
  const params = new URLSearchParams();
  if (search) params.set('search', search);
  if (dept) params.set('department', dept);
  const data = await apiFetch('/faculty?' + params);
  const tbody = document.getElementById('faculty-tbody');
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>No faculty records found</p></div></td></tr>`; return; }
  tbody.innerHTML = data.map(f => `
    <tr>
      <td><strong>${f.name}</strong></td>
      <td>${f.department || '—'}</td>
      <td>${f.designation || '—'}</td>
      <td>${f.qualification || '—'}</td>
      <td>${f.experience ?? '—'} yrs</td>
      <td>${f.publications ?? 0}</td>
      <td>${canEdit ? `
        <button class="btn btn-sm btn-secondary btn-icon" onclick="editFaculty(${JSON.stringify(f).replace(/"/g,'&quot;')})" title="Edit">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn btn-sm btn-danger btn-icon" onclick="deleteFaculty(${f.id})" title="Delete">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>` : '—'}
      </td>
    </tr>`).join('');
}

function editFaculty(f) {
  editId = f.id;
  document.getElementById('modal-title').textContent = 'Edit Faculty';
  document.getElementById('f-name').value = f.name;
  document.getElementById('f-dept').value = f.department || '';
  document.getElementById('f-desig').value = f.designation || '';
  document.getElementById('f-qual').value = f.qualification || '';
  document.getElementById('f-exp').value = f.experience || '';
  document.getElementById('f-pub').value = f.publications || '';
  openModal('faculty-modal');
}

async function deleteFaculty(id) {
  if (!confirm('Delete this faculty record?')) return;
  try { await apiFetch('/faculty/' + id, { method: 'DELETE' }); showToast('Faculty deleted'); load(); } catch(e) { showToast(e.message, 'error'); }
}

async function saveFaculty(e) {
  e.preventDefault();
  const body = { name: document.getElementById('f-name').value, department: document.getElementById('f-dept').value, designation: document.getElementById('f-desig').value, qualification: document.getElementById('f-qual').value, experience: document.getElementById('f-exp').value, publications: document.getElementById('f-pub').value };
  try {
    if (editId) { await apiFetch('/faculty/' + editId, { method: 'PUT', body: JSON.stringify(body) }); showToast('Faculty updated'); }
    else { await apiFetch('/faculty', { method: 'POST', body: JSON.stringify(body) }); showToast('Faculty added'); }
    closeModal('faculty-modal'); editId = null; load();
  } catch(e) { showToast(e.message, 'error'); }
}

document.getElementById('page-content').innerHTML = `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Faculty Records</span>
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="search" placeholder="Search faculty..." oninput="load(this.value, document.getElementById('dept-filter').value)" />
        </div>
        <select class="filter-select" id="dept-filter" onchange="load(document.getElementById('search').value, this.value)">
          <option value="">All Departments</option>
          <option>Computer Science</option><option>Electronics</option><option>Mechanical</option><option>Civil</option><option>Mathematics</option>
        </select>
        ${canEdit ? `<button class="btn btn-primary" onclick="editId=null;document.getElementById('modal-title').textContent='Add Faculty';openModal('faculty-modal')">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Faculty
        </button>` : ''}
      </div>
    </div>
    <div class="table-wrapper">
      <table><thead><tr><th>Name</th><th>Department</th><th>Designation</th><th>Qualification</th><th>Experience</th><th>Publications</th><th>Actions</th></tr></thead>
      <tbody id="faculty-tbody"><tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr></tbody></table>
    </div>
  </div>

  <div class="modal-overlay" id="faculty-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Faculty</span>
        <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal('faculty-modal')">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form onsubmit="saveFaculty(event)">
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Full Name *</label><input class="form-control" id="f-name" required /></div>
            <div class="form-group"><label class="form-label">Department</label><input class="form-control" id="f-dept" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Designation</label><input class="form-control" id="f-desig" /></div>
            <div class="form-group"><label class="form-label">Qualification</label><input class="form-control" id="f-qual" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Experience (years)</label><input class="form-control" id="f-exp" type="number" min="0" /></div>
            <div class="form-group"><label class="form-label">Publications</label><input class="form-control" id="f-pub" type="number" min="0" /></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('faculty-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
`;
load();
</script>
</body>
</html>
