<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Achievements – AccrediTrack</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
renderLayout('Student Achievements', 'students');
const user = getUser();
const canEdit = ['Admin','HOD','Faculty'].includes(user.role);
const canDelete = ['Admin','HOD'].includes(user.role);
let editId = null;

async function load(search='', dept='', type='') {
  const p = new URLSearchParams();
  if (search) p.set('search', search);
  if (dept) p.set('department', dept);
  if (type) p.set('achievement_type', type);
  const data = await apiFetch('/students?' + p);
  const tbody = document.getElementById('s-tbody');
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg><p>No achievements found</p></div></td></tr>`; return; }
  tbody.innerHTML = data.map(s => `
    <tr>
      <td><strong>${s.name}</strong></td>
      <td>${s.roll_number}</td>
      <td>${s.department || '—'}</td>
      <td>Year ${s.year || '—'}</td>
      <td><span class="badge badge-${(s.achievement_type||'').toLowerCase()}">${s.achievement_type || '—'}</span></td>
      <td>${s.achievement_title || '—'}</td>
      <td>${formatDate(s.achievement_date)}</td>
      <td style="display:flex;gap:4px">
        ${canEdit ? `<button class="btn btn-sm btn-secondary btn-icon" onclick="editStudent(${JSON.stringify(s).replace(/"/g,'&quot;')})" title="Edit"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>` : ''}
        ${canDelete ? `<button class="btn btn-sm btn-danger btn-icon" onclick="deleteStudent(${s.id})" title="Delete"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>` : ''}
        ${!canEdit && !canDelete ? '—' : ''}
      </td>
    </tr>`).join('');
}

function editStudent(s) {
  editId = s.id;
  document.getElementById('s-modal-title').textContent = 'Edit Achievement';
  ['name','roll_number','department','year','achievement_type','achievement_title','achievement_date','description'].forEach(k => {
    const el = document.getElementById('s-' + k.replace('_','-'));
    if (el) el.value = s[k] || '';
  });
  openModal('student-modal');
}

async function deleteStudent(id) {
  if (!confirm('Delete this record?')) return;
  try { await apiFetch('/students/' + id, { method: 'DELETE' }); showToast('Deleted'); load(); } catch(e) { showToast(e.message,'error'); }
}

async function saveStudent(e) {
  e.preventDefault();
  const body = {
    name: document.getElementById('s-name').value,
    roll_number: document.getElementById('s-roll-number').value,
    department: document.getElementById('s-department').value,
    year: document.getElementById('s-year').value,
    achievement_type: document.getElementById('s-achievement-type').value,
    achievement_title: document.getElementById('s-achievement-title').value,
    achievement_date: document.getElementById('s-achievement-date').value,
    description: document.getElementById('s-description').value
  };
  try {
    if (editId) { await apiFetch('/students/' + editId, { method: 'PUT', body: JSON.stringify(body) }); showToast('Updated'); }
    else { await apiFetch('/students', { method: 'POST', body: JSON.stringify(body) }); showToast('Achievement added'); }
    closeModal('student-modal'); editId = null; load();
  } catch(e) { showToast(e.message,'error'); }
}

document.getElementById('page-content').innerHTML = `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Student Achievements</span>
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="s-search" placeholder="Search students..." oninput="load(this.value,document.getElementById('s-dept').value,document.getElementById('s-type').value)" />
        </div>
        <select class="filter-select" id="s-dept" onchange="load(document.getElementById('s-search').value,this.value,document.getElementById('s-type').value)">
          <option value="">All Departments</option>
          <option>Computer Science</option><option>Electronics</option><option>Mechanical</option><option>Civil</option>
        </select>
        <select class="filter-select" id="s-type" onchange="load(document.getElementById('s-search').value,document.getElementById('s-dept').value,this.value)">
          <option value="">All Types</option>
          <option>Academic</option><option>Sports</option><option>Cultural</option><option>Technical</option><option>Other</option>
        </select>
        ${canEdit ? `<button class="btn btn-primary" onclick="editId=null;document.getElementById('s-modal-title').textContent='Add Achievement';openModal('student-modal')">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Achievement
        </button>` : ''}
      </div>
    </div>
    <div class="table-wrapper">
      <table><thead><tr><th>Name</th><th>Roll No.</th><th>Department</th><th>Year</th><th>Type</th><th>Achievement</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody id="s-tbody"><tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr></tbody></table>
    </div>
  </div>

  <div class="modal-overlay" id="student-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="s-modal-title">Add Achievement</span>
        <button class="btn btn-sm btn-secondary btn-icon" onclick="closeModal('student-modal')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form onsubmit="saveStudent(event)">
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Student Name *</label><input class="form-control" id="s-name" required /></div>
            <div class="form-group"><label class="form-label">Roll Number *</label><input class="form-control" id="s-roll-number" required /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Department</label><input class="form-control" id="s-department" /></div>
            <div class="form-group"><label class="form-label">Year</label><select class="form-control" id="s-year"><option value="">Select</option><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Achievement Type</label><select class="form-control" id="s-achievement-type"><option>Academic</option><option>Sports</option><option>Cultural</option><option>Technical</option><option>Other</option></select></div>
            <div class="form-group"><label class="form-label">Achievement Date</label><input class="form-control" id="s-achievement-date" type="date" /></div>
          </div>
          <div class="form-group"><label class="form-label">Achievement Title</label><input class="form-control" id="s-achievement-title" /></div>
          <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="s-description" rows="3" style="resize:vertical"></textarea></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('student-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
`;
load();
</script>
</body>
</html>
