<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccrediTrack – Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h1>AccrediTrack</h1>
      <p>Accreditation Data Management System</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alert-box"></div>

    <!-- LOGIN -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span>Sign In</span>
      </button>
      <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)">
        Demo: admin@accreditrack.com / admin123
      </p>
    </form>

    <!-- REGISTER -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="reg-name" placeholder="Dr. John Doe" required />
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-control" id="reg-role">
            <option>Faculty</option>
            <option>HOD</option>
            <option>Auditor</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Department</label>
        <input type="text" class="form-control" id="reg-dept" placeholder="Computer Science" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="reg-password" placeholder="Min 6 characters" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="reg-btn">Create Account</button>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (getToken()) window.location.href = '/dashboard.html';

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
    document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    document.getElementById('alert-box').innerHTML = '';
  }

  function showAlert(msg, type = 'error') {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<div class="spinner"></div>';
    btn.disabled = true;
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value }) });
      localStorage.setItem('at_token', data.token);
      localStorage.setItem('at_user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert(err.message);
      btn.innerHTML = '<span>Sign In</span>';
      btn.disabled = false;
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.textContent = 'Creating...';
    btn.disabled = true;
    try {
      await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password: document.getElementById('reg-password').value, role: document.getElementById('reg-role').value, department: document.getElementById('reg-dept').value }) });
      showAlert('Account created! Please sign in.', 'success');
      switchTab('login');
    } catch (err) {
      showAlert(err.message);
    } finally {
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
